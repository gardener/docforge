name: Release
on:
  workflow_dispatch:
    inputs:
      next-version:
        type: choice
        options:
          - bump-minor
          - bump-patch

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      mode: release

  release-to-github-and-bump:
    uses: gardener/cc-utils/.github/workflows/release.yaml@v1
    needs:
      - build
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      release-commit-target: branch
      next-version: ${{ inputs.next-version }}
      next-version-callback-action-path:
      slack-channel-id: G01MH3C9UCS # #gardener-documentation
      assets: |
        - name: docforge-darwin-amd64
          type: ocm-resource
          id:
            name: docforge
            os: darwin
            architecture: amd64
        - name: docforge-darwin-arm64
          type: ocm-resource
          id:
            name: docforge
            os: darwin
            architecture: arm64
        - name: docforge-linux-amd64
          type: ocm-resource
          id:
            name: docforge
            os: linux
            architecture: amd64
        - name: docforge-linux-arm64
          type: ocm-resource
          id:
            name: docforge
            os: linux
            architecture: arm64
        - name: docforge-windows-386
          type: ocm-resource
          id:
            name: docforge
            os: windows
            architecture: '386'
